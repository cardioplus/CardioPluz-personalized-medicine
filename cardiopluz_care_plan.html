<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardioPluz · แผนดูแลหัวใจเฉพาะบุคคล</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#15a89c; --teal-dark:#0e7a71; --teal-deep:#0a5a54;
  --teal-soft:#e7f5f3; --teal-mist:#f1f8f7;
  --ink:#16302d; --slate:#5c6f6c; --faint:#8aa19d;
  --line:#d7e7e3; --line-soft:#e8f1ef;
  --paper:#ffffff; --bg:#eef4f3;
  --gold:#b8924e; --gold-soft:#f3ead7;
  --warn:#c2562f; --warn-soft:#fbeee6;
  --shadow:0 10px 40px -18px rgba(10,90,84,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Sarabun',system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(21,168,156,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(21,168,156,.08), transparent 55%),
    var(--bg);
  color:var(--ink); line-height:1.6; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.kanit{font-family:'Kanit',sans-serif;font-weight:600;letter-spacing:.1px}
.wrap{max-width:1080px;margin:0 auto;padding:32px 20px 80px}

/* ---------- App header ---------- */
.app-head{display:flex;align-items:center;gap:18px;margin-bottom:26px}
.app-head img{height:62px;width:auto;filter:drop-shadow(0 4px 10px rgba(10,90,84,.15))}
.app-head .titleblock h1{font-size:1.38rem;margin:0;color:var(--teal-deep)}
.app-head .titleblock p{margin:2px 0 0;color:var(--slate);font-size:.95rem}
.app-head .titleblock .eyebrow{
  font-family:'Kanit';font-weight:500;font-size:.72rem;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--teal);display:block;margin-bottom:2px}

/* ---------- Card / form ---------- */
.card{background:var(--paper);border:1px solid var(--line);border-radius:20px;
  box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:20px 26px;border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,var(--teal-mist),var(--paper))}
.card-head .step{flex:none;width:30px;height:30px;border-radius:50%;background:var(--teal);
  color:#fff;font-family:'Kanit';font-weight:600;display:grid;place-items:center;font-size:.95rem}
.card-head h2{font-size:1.06rem;margin:0;color:var(--teal-deep)}
.card-head p{margin:1px 0 0;font-size:.85rem;color:var(--faint)}
.card-body{padding:24px 26px}

.grid{display:grid;gap:16px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media (max-width:640px){.g3,.g2{grid-template-columns:1fr}}

.field label{display:block;font-size:.82rem;font-weight:600;color:var(--slate);margin-bottom:6px}
.field .unit{color:var(--faint);font-weight:400}
input[type=text],input[type=number],select{
  width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:12px;
  font-family:inherit;font-size:.98rem;color:var(--ink);background:#fbfdfc;transition:.18s}
input:focus,select:focus{outline:none;border-color:var(--teal);background:#fff;
  box-shadow:0 0 0 4px rgba(21,168,156,.12)}
.bp-row{display:flex;align-items:center;gap:10px}
.bp-row span{color:var(--faint);font-weight:600}

/* ---------- Condition checklist ---------- */
.cond-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media (max-width:640px){.cond-grid{grid-template-columns:1fr}}
.cond{border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;background:#fbfdfc;
  transition:.18s;cursor:pointer}
.cond:hover{border-color:var(--teal);background:#fff}
.cond.on{border-color:var(--teal);background:var(--teal-mist);box-shadow:0 0 0 3px rgba(21,168,156,.1)}
.cond .top{display:flex;align-items:flex-start;gap:11px}
.cond input[type=checkbox]{width:20px;height:20px;accent-color:var(--teal);margin-top:2px;flex:none;cursor:pointer}
.cond .nm{font-family:'Kanit';font-weight:500;font-size:.98rem;line-height:1.3}
.cond .sub{color:var(--faint);font-size:.8rem;margin-top:2px}
.cond .extra{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);display:none}
.cond.on .extra.show{display:block}
.cond .extra label{font-weight:500;font-size:.82rem;color:var(--slate);display:flex;
  align-items:center;gap:8px;margin:6px 0;cursor:pointer}
.cond .extra input[type=radio],.cond .extra input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal)}

/* ---------- Actions ---------- */
.actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
.btn{font-family:'Kanit';font-weight:500;font-size:1rem;padding:13px 30px;border-radius:13px;
  border:none;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:9px}
.btn-primary{background:var(--teal);color:#fff;box-shadow:0 8px 24px -8px rgba(21,168,156,.6)}
.btn-primary:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--slate);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal-dark)}
.alert{background:var(--warn-soft);color:var(--warn);border:1px solid #f0d2c2;border-radius:12px;
  padding:12px 16px;margin-top:16px;font-size:.9rem;display:none}
.alert.show{display:block}
.stack{display:flex;flex-direction:column;gap:22px}

/* ================= REPORT ================= */
#report{display:none}
#report.show{display:block}
.report-sheet{background:#fff;border-radius:18px;box-shadow:var(--shadow);overflow:hidden;
  border:1px solid var(--line)}
.rep-top{padding:34px 44px 26px;background:linear-gradient(135deg,var(--teal-deep),var(--teal));
  color:#fff;position:relative;overflow:hidden}
.rep-top::after{content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;
  border:2px solid rgba(255,255,255,.13);border-radius:50%}
.rep-top::before{content:"";position:absolute;right:10px;bottom:-90px;width:200px;height:200px;
  border:2px solid rgba(255,255,255,.1);border-radius:50%}
.rep-brand{display:flex;align-items:center;gap:16px;position:relative;z-index:1}
.rep-brand .logobox{background:#fff;border-radius:14px;padding:8px 12px;line-height:0}
.rep-brand img{height:46px;width:auto}
.rep-brand .bn .eyebrow{font-family:'Kanit';font-weight:300;font-size:.7rem;letter-spacing:3px;
  text-transform:uppercase;opacity:.85}
.rep-brand .bn h2{margin:1px 0 0;font-size:1.25rem;font-weight:600}
.rep-title{margin-top:22px;position:relative;z-index:1}
.rep-title .gold-rule{width:54px;height:3px;background:var(--gold);border-radius:2px;margin-bottom:12px}
.rep-title h1{font-family:'Kanit';font-weight:600;font-size:1.6rem;margin:0;line-height:1.2}
.rep-title p{margin:4px 0 0;opacity:.9;font-size:.95rem}

.rep-meta{display:flex;flex-wrap:wrap;gap:0;border-bottom:1px solid var(--line-soft)}
.rep-meta .m{flex:1 1 25%;min-width:120px;padding:16px 20px;border-right:1px solid var(--line-soft)}
.rep-meta .m:last-child{border-right:none}
.rep-meta .m .lbl{font-size:.72rem;letter-spacing:.5px;color:var(--faint);text-transform:uppercase;font-family:'Kanit';font-weight:500}
.rep-meta .m .val{font-family:'Kanit';font-weight:600;font-size:1.02rem;color:var(--teal-deep);margin-top:3px}

.rep-body{padding:30px 44px 40px}

/* Target stat cards */
.targets{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
@media (max-width:760px){.targets{grid-template-columns:repeat(2,1fr)}}
.tcard{border:1px solid var(--line);border-radius:15px;padding:16px 16px 15px;position:relative;
  background:linear-gradient(180deg,var(--teal-mist),#fff)}
.tcard .ico{font-size:1.2rem;line-height:1}
.tcard .tlbl{font-family:'Kanit';font-weight:500;font-size:.78rem;color:var(--slate);margin-top:8px}
.tcard .tval{font-family:'Kanit';font-weight:700;font-size:1.45rem;color:var(--teal-deep);
  margin-top:2px;line-height:1.1}
.tcard .tval small{font-size:.78rem;font-weight:500;color:var(--slate)}
.tcard .tnote{font-size:.74rem;color:var(--faint);margin-top:4px;line-height:1.35}
.tcard.accent{background:linear-gradient(180deg,var(--gold-soft),#fff);border-color:#e7d4ab}
.tcard.accent .tval{color:#8a6a2e}

.sec{margin-top:30px;page-break-inside:avoid}
.sec-h{display:flex;align-items:center;gap:11px;margin-bottom:14px;padding-bottom:9px;
  border-bottom:2px solid var(--teal-soft)}
.sec-h .dot{width:11px;height:11px;border-radius:3px;background:var(--teal);transform:rotate(45deg);flex:none}
.sec-h h3{margin:0;font-size:1.12rem;color:var(--teal-deep)}
.sec-h .en{font-family:'Kanit';font-weight:300;font-size:.78rem;color:var(--faint);letter-spacing:1px;margin-left:auto}

ul.rl{list-style:none;margin:0;padding:0}
ul.rl li{position:relative;padding:7px 0 7px 26px;border-bottom:1px dashed var(--line-soft);font-size:.97rem}
ul.rl li:last-child{border-bottom:none}
ul.rl li::before{content:"";position:absolute;left:6px;top:15px;width:7px;height:7px;border-radius:50%;
  background:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
ul.rl li b{color:var(--teal-deep);font-weight:600}
.flag{background:var(--warn-soft);border-left:3px solid var(--warn);padding:11px 15px;border-radius:0 10px 10px 0;
  margin:14px 0 4px;font-size:.92rem;color:#7a3318}
.flag b{color:var(--warn)}
.subh{font-family:'Kanit';font-weight:600;font-size:.96rem;color:var(--teal-deep);margin:20px 0 9px}
.ftable{width:100%;border-collapse:collapse;font-size:.93rem;margin-top:2px}
.ftable td{padding:7px 12px;border-bottom:1px solid var(--line-soft)}
.ftable tr:nth-child(odd){background:var(--teal-mist)}
.ftable td:last-child{text-align:right;font-family:'Kanit';font-weight:700;color:var(--teal-deep);white-space:nowrap}
.tip{font-size:.9rem;color:var(--slate);margin:9px 0 0;padding:9px 13px;background:var(--teal-mist);border-radius:10px}
.tip b{color:var(--teal-deep)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 4px}
.chip{background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:4px 13px;font-size:.87rem;color:var(--teal-deep)}
.chip.bad{background:var(--warn-soft);border-color:#eccab8;color:#8a3a1c}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media (max-width:640px){.twocol{grid-template-columns:1fr}}
.callout{background:var(--gold-soft);border-left:4px solid var(--gold);padding:13px 17px;border-radius:0 12px 12px 0;margin:16px 0;font-size:.95rem;line-height:1.55}
.callout .ct{font-family:'Kanit';font-weight:600;color:#8a6a2e;display:block;margin-bottom:3px}
.callout b{color:#7a5a22}

.vacc{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media (max-width:640px){.vacc{grid-template-columns:1fr}}
.vacc .v{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:11px 14px;background:#fbfdfc}
.vacc .v .vi{width:30px;height:30px;border-radius:9px;background:var(--teal-soft);display:grid;place-items:center;flex:none;font-size:.95rem}
.vacc .v .vt{font-family:'Kanit';font-weight:500;font-size:.93rem;color:var(--teal-deep)}
.vacc .v .vd{font-size:.8rem;color:var(--slate);margin-top:1px}

.rep-foot{margin-top:34px;padding-top:18px;border-top:1px solid var(--line)}
.rep-foot .disc{font-size:.78rem;color:var(--faint);line-height:1.5}
.rep-foot .sig{display:flex;justify-content:space-between;align-items:flex-end;margin-top:18px;gap:20px;flex-wrap:wrap}
.rep-foot .sig .doc{font-size:.82rem;color:var(--slate)}
.rep-foot .sig .doc b{font-family:'Kanit';color:var(--teal-deep)}
.rep-foot .stamp{text-align:right;font-size:.78rem;color:var(--faint)}
.rep-foot .stamp .clinic{font-family:'Kanit';font-weight:600;color:var(--teal)}

.print-bar{display:flex;justify-content:flex-end;gap:12px;margin:18px 2px 0}

/* ---------- Print ---------- */
@media print{
  @page{size:A4;margin:12mm}
  body{background:#fff}
  .wrap{max-width:none;padding:0}
  .no-print{display:none !important}
  #report{display:block !important}
  .report-sheet{box-shadow:none;border:none;border-radius:0}
  .rep-top{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .tcard,.sec-h,.vacc .v,.flag,.rep-top,.sec-h .dot,.tcard.accent,.chip,.chip.bad,.callout,.ftable tr,.tip{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rep-body{padding:8px 0 0}
  .rep-meta .m{padding:10px 14px}
  .sec{margin-top:20px}
}
</style>
</head>

    <div class="titleblock">
      <span class="eyebrow">Personalized Heart Care</span>
      <h1>เครื่องสร้างแผนดูแลหัวใจเฉพาะบุคคล</h1>
      <p>กรอกข้อมูลผู้ป่วยและเลือกภาวะที่เป็น ระบบจะคำนวณเป้าหมายและออกรายงานพร้อมพิมพ์</p>

  </div>

  <div class="stack no-print">
    <!-- ===== STEP 1: patient data ===== -->
    <div class="card">
      <div class="card-head"><div class="step">1</div>
        <div><h2>ข้อมูลผู้ป่วย</h2><p>ใช้คำนวณ BMI · พลังงาน · โปรตีน · โซนหัวใจ</p></div>
      </div>
      <div class="card-body">
        <div class="grid g3">
          <div class="field" style="grid-column:span 2">
            <label>ชื่อ–นามสกุล</label>
            <input type="text" id="name" placeholder="เช่น คุณสมหญิง ใจดี">
          </div>
          <div class="field">
            <label>เพศ</label>
            <select id="sex"><option value="female">หญิง</option><option value="male">ชาย</option></select>
          </div>
          <div class="field"><label>อายุ <span class="unit">(ปี)</span></label><input type="number" id="age" min="1" max="120" placeholder="60"></div>
          <div class="field"><label>น้ำหนัก <span class="unit">(กก.)</span></label><input type="number" id="wt" min="20" max="250" step="0.1" placeholder="65"></div>
          <div class="field"><label>ส่วนสูง <span class="unit">(ซม.)</span></label><input type="number" id="ht" min="100" max="220" placeholder="160"></div>
          <div class="field">
            <label>ความดันโลหิตที่วัดได้ <span class="unit">(SBP/DBP มม.ปรอท)</span></label>
            <div class="bp-row"><input type="number" id="sbp" placeholder="128"><span>/</span><input type="number" id="dbp" placeholder="78"></div>
          </div>
          <div class="field"><label>ชีพจรขณะพัก <span class="unit">(ครั้ง/นาที · ไม่บังคับ)</span></label><input type="number" id="rhr" min="30" max="160" placeholder="72"></div>
          <div class="field">
            <label>ระดับกิจกรรมประจำวัน</label>
            <select id="act">
              <option value="1.2">นั่งทำงาน/ไม่ค่อยขยับ</option>
              <option value="1.375" selected>ออกแรงเบา (1–3 วัน/สัปดาห์)</option>
              <option value="1.55">ปานกลาง (3–5 วัน/สัปดาห์)</option>
              <option value="1.725">หนัก (6–7 วัน/สัปดาห์)</option>
            </select>
          </div>
          <div class="field">
            <label>สูบบุหรี่</label>
            <select id="smoke"><option value="no">ไม่สูบ</option><option value="yes">สูบ / เพิ่งเลิก</option></select>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== STEP 2: conditions ===== -->
    <div class="card">
      <div class="card-head"><div class="step">2</div>
        <div><h2>ภาวะ/โรคประจำตัว</h2><p>เลือกได้หลายข้อ — ระบบจะรวมคำแนะนำให้แบบไม่ซ้ำซ้อน</p></div>
      </div>
      <div class="card-body">
        <div class="cond-grid" id="condGrid">

          <label class="cond" data-k="acs">
            <div class="top"><input type="checkbox"><div><div class="nm">หลอดเลือดหัวใจตีบเฉียบพลัน</div><div class="sub">ACS · NSTEMI / STEMI (ช่วงฟื้นฟู)</div></div></div>
            <div class="extra">
              <label><input type="radio" name="acsPhase" value="early" checked> ช่วง 1–4 สัปดาห์แรก</label>

          </label>

          <label class="cond" data-k="ccs">
            <div class="top"><input type="checkbox"><div><div class="nm">หลอดเลือดหัวใจตีบเรื้อรัง</div><div class="sub">CCS · Chronic Coronary Syndrome</div></div></div>
          </label>

          <label class="cond" data-k="hf">
            <div class="top"><input type="checkbox"><div><div class="nm">ภาวะหัวใจล้มเหลว</div><div class="sub">HFrEF / HFmrEF / HFpEF</div></div></div>
          </label>

          <label class="cond" data-k="af">
            <div class="top"><input type="checkbox"><div><div class="nm">หัวใจเต้นผิดจังหวะ</div><div class="sub">AF / SVT</div></div></div>
            <div class="extra">
              <label><input type="checkbox" name="warfarin"> ทานยา Warfarin</label>
              <label><input type="checkbox" name="noac"> ทานยาต้านการแข็งตัวกลุ่มใหม่ (NOAC/DOAC)</label>
            </div>
          </label>

          <label class="cond" data-k="vhd">
            <div class="top"><input type="checkbox"><div><div class="nm">โรคลิ้นหัวใจ</div><div class="sub">Valvular Heart Disease</div></div></div>
            <div class="extra">
              <label><input type="radio" name="vhdStatus" value="preop" checked> ยังไม่ได้ผ่าตัด</label>
              <label style="margin-left:24px"><input type="checkbox" name="severeAS"> เป็น Severe AS</label>
              <label><input type="radio" name="vhdStatus" value="post_early"> ผ่าตัดแล้ว ≤ 8 สัปดาห์</label>
              <label><input type="radio" name="vhdStatus" value="post_late"> ผ่าตัดแล้ว &gt; 8 สัปดาห์</label>

          <label class="cond" data-k="dm">
            <div class="top"><input type="checkbox"><div><div class="nm">เบาหวาน</div><div class="sub">Diabetes Mellitus</div></div></div>

<script>
/* =========================================================
   CardioPluz · personalized care-plan engine
   อ้างอิงแนวทาง ACC/AHA, ESC, ADA และแนวทางไทยเฉพาะโรค
   ========================================================= */

const $ = s => document.querySelector(s);
const conds = {};                 // selected conditions -> true
document.querySelectorAll('.cond').forEach(c=>{
  const cb = c.querySelector('input[type=checkbox]');
  const extra = c.querySelector('.extra');
  cb.addEventListener('change',()=>{
    c.classList.toggle('on',cb.checked);
    if(extra) extra.classList.toggle('show',cb.checked);
  });
  // prevent label toggling checkbox twice when clicking inner controls
  c.addEventListener('click',e=>{ if(e.target.closest('.extra') && e.target!==cb) e.stopPropagation(); });
});

function round(n,step=1){return Math.round(n/step)*step;}
function pretty(n){return n.toLocaleString('en-US');}

function readForm(){
  const get=id=>$(id).value.trim();
  const num=id=>parseFloat($(id).value);
  const p={
    name:get('#name')||'ผู้รับบริการ',
    sex:$('#sex').value,
    age:num('#age'), wt:num('#wt'), ht:num('#ht'),
    sbp:num('#sbp'), dbp:num('#dbp'), rhr:num('#rhr'),
    act:parseFloat($('#act').value), smoke:$('#smoke').value
  };
  const c={};
  document.querySelectorAll('.cond').forEach(el=>{
    if(el.querySelector('input[type=checkbox]').checked) c[el.dataset.k]=true;
  });
  c.acsPhase = document.querySelector('input[name=acsPhase]:checked')?.value;
  c.vhdStatus = document.querySelector('input[name=vhdStatus]:checked')?.value;
  c.severeAS = document.querySelector('input[name=severeAS]')?.checked;
  c.warfarin = document.querySelector('input[name=warfarin]')?.checked;
  c.noac = document.querySelector('input[name=noac]')?.checked;
  return {p,c};
}

function validate(p){
  const e=[];
  if(!p.age||p.age<1) e.push('อายุ');
  if(!p.wt||p.wt<20) e.push('น้ำหนัก');
  if(!p.ht||p.ht<100) e.push('ส่วนสูง');
  if(!p.sbp||!p.dbp) e.push('ความดันโลหิต');
  return e;
}

/* ---------- core engine ---------- */
function buildPlan(p,c){
  const hm=p.ht/100, bmi=p.wt/(hm*hm);
  const idealLo=18.5*hm*hm, idealHi=22.9*hm*hm, idealTarget=22*hm*hm;
  let bmiStatus;
  if(bmi<18.5)bmiStatus='น้ำหนักน้อย';
  else if(bmi<23)bmiStatus='ปกติ (สมส่วน)';
  else if(bmi<25)bmiStatus='น้ำหนักเกิน';
  else if(bmi<30)bmiStatus='อ้วน ระดับ 1';
  else bmiStatus='อ้วน ระดับ 2';

  const has=k=>!!c[k];
  const acsEarly = has('acs') && c.acsPhase==='early';
  const acsLate  = has('acs') && c.acsPhase==='late';
  const vhdPostEarly = has('vhd') && c.vhdStatus==='post_early';

    if(c.noac) med.add('ทานยากลุ่ม NOAC/DOAC ให้ตรงเวลาทุกวัน (ออกฤทธิ์สั้น หากลืมยาเสี่ยงลิ่มเลือดทันที) · แจ้งแพทย์/ทันตแพทย์ก่อนผ่าตัดหรือทำหัตถการ · เลี่ยงยาแก้ปวด NSAIDs และสมุนไพรที่ทำให้เลือดออกง่าย');
  }
  if(has('vhd')){
    med.add('ดูแลสุขภาพช่องปาก แปรงฟันสะอาด พบทันตแพทย์ทุก 6 เดือน');
    med.add('แจ้งแพทย์/ทันตแพทย์ทุกครั้งก่อนทำฟัน เพื่อรับยาปฏิชีวนะป้องกันลิ้นหัวใจติดเชื้อ (IE)');
  }
  if(has('dm')){
    med.add('ตรวจเช็กเท้าทุกวัน และตรวจตา/จอประสาทตาประจำปี');
    med.add('ตรวจการทำงานของไตและไข่ขาวในปัสสาวะประจำปี');
  }
  if(has('ht')) med.add('วัดความดันที่บ้าน (HBPM) เช้า–เย็น และจดบันทึกมาให้แพทย์');
  if(has('dlp')) med.add('ทานยาลดไขมันสม่ำเสมอ และตรวจระดับไขมันตามนัด');
  if(has('ob')) med.add('ตั้งเป้าลดน้ำหนัก 5–10% ภายใน 3–6 เดือน อย่างค่อยเป็นค่อยไป');
  if(has('ckd')) med.add('หลีกเลี่ยงยาแก้ปวด NSAIDs · ตรวจ eGFR และโพแทสเซียมตามนัด');
  if(p.smoke==='yes'||has('acs')) med.add('งดสูบบุหรี่ 100% และหลีกเลี่ยงควันบุหรี่มือสอง');

  /* ---- Vaccines ---- */
  const vacc=[];
  vacc.push(['💉','ไข้หวัดใหญ่ (Influenza)','ฉีดทุกปี — ลดการกำเริบของโรคหัวใจ']);
  if(established||has('dm')||has('ckd')||p.age>=65)
    vacc.push(['🫁','ปอดอักเสบ (Pneumococcal · PCV20)','สำหรับผู้มีโรคหัวใจเรื้อรัง/เบาหวาน/ไต หรืออายุ ≥ 65 ปี']);
  if(has('acs')||has('hf')||p.age>=60)
    vacc.push(['🦠','COVID-19','ตามเข็มกระตุ้นที่แนะนำในกลุ่มเสี่ยง']);
  if(p.age>=75 || (p.age>=60 && (has('hf')||has('ccs')||has('acs')||has('dm')||has('ckd'))))
    vacc.push(['🌬️','RSV','แนะนำในผู้สูงอายุ ≥ 60–75 ปี ที่มีโรคหัวใจ/ปอด/เบาหวาน']);
  vacc.push(['🩹','คอตีบ-บาดทะยัก-ไอกรน (Tdap/Td)', has('dm')?'กระตุ้นทุก 10 ปี · สำคัญมากหากมีแผลเบาหวาน':'กระตุ้นทุก 10 ปี']);
  if(p.age>=50) vacc.push(['🎯','งูสวัด (Shingrix)','แนะนำในผู้อายุ ≥ 50 ปี']);

  /* ---- Conflict flags ---- */
  const flags=[];
  if(has('ckd') && (has('hf')||vhdPostEarly||metabolic))
    flags.push('มีทั้งภาวะที่ต้องการโปรตีนสูงและโรคไตเรื้อรัง — แผนนี้เลือก<b>จำกัดโปรตีนเพื่อถนอมไตเป็นหลัก</b> ควรให้แพทย์/นักกำหนดอาหารปรับตามค่า eGFR จริง');
  if(has('ckd') && has('ht'))
    flags.push('ความดันสูงร่วมกับโรคไต — เน้นลดโซเดียมแต่ <b>ไม่เพิ่มโพแทสเซียม</b> โดยไม่ปรึกษาแพทย์');

  return {bmi,bmiStatus,idealLo,idealHi,proteinG,pLo,pHi,pBasisTxt,pNote,
    tdee,kcalTarget,kcalNote,naTxt,fluid,hrLo,hrHi,zoneLabel,bpTarget,bpNote,
    nut,proteinFoods,veg,fruitOk,fruitLimit,oilOk,oilAvoid,oilNote,sugaryNote,saltSub,
    ex,med:[...med],vacc,flags,maxHR};
}

function condBadges(c){
  const map={acs:'ACS (หลอดเลือดหัวใจเฉียบพลัน)',ccs:'CCS (หลอดเลือดหัวใจเรื้อรัง)',hf:'หัวใจล้มเหลว',
    af:'หัวใจเต้นผิดจังหวะ',vhd:'โรคลิ้นหัวใจ',dm:'เบาหวาน',ht:'ความดันสูง',dlp:'ไขมันสูง',ob:'น้ำหนักเกิน/อ้วน',ckd:'โรคไตเรื้อรัง'};
  return Object.keys(map).filter(k=>c[k]).map(k=>map[k]).join(' · ')||'การป้องกันโรคหัวใจทั่วไป';
}

          <div class="tnote">${r.kcalNote} (TDEE ≈ ${pretty(round(r.tdee,10))})</div></div>

        <div class="tcard"><div class="ico">🧂</div><div class="tlbl">โซเดียมต่อวัน</div>
          <div class="tval" style="font-size:1.15rem">${r.naTxt}</div>
          <div class="tnote">เกลือ ≈ 1 ช้อนชา</div></div>

        <div class="tcard"><div class="ico">❤️</div><div class="tlbl">ชีพจรขณะออกกำลังกาย</div>
          <div class="tval">${r.hrLo}–${r.hrHi} <small>ครั้ง/นาที</small></div>
          <div class="tnote">${r.zoneLabel} (Max HR ≈ ${r.maxHR})</div></div>

        <div class="tcard"><div class="ico">🩸</div><div class="tlbl">ความดันเป้าหมาย (HBPM)</div>
          <div class="tval">${r.bpTarget} <small>มม.ปรอท</small></div>
          <div class="tnote">วัดที่บ้าน · ${r.bpNote}<br>ค่าที่วัดได้: ${p.sbp}/${p.dbp}</div></div>

        ${r.fluid?`<div class="tcard"><div class="ico">💧</div><div class="tlbl">จำกัดน้ำดื่มต่อวัน</div>
          <div class="tval" style="font-size:1.2rem">${r.fluid}</div>
          <div class="tnote">รวมน้ำซุป/นม · ควรตวง</div></div>`:''}
      </div>
    </div>

    ${flagHtml}

    <div class="sec">
      <div class="sec-h"><span class="dot"></span><h3>โภชนาการ</h3><span class="en">NUTRITION</span></div>
      <ul class="rl">${liList(r.nut)}</ul>
      ${r.pNote?`<div class="flag"><b>หมายเหตุโปรตีน:</b> ${r.pNote}</div>`:''}

      <div class="callout"><span class="ct">🥤 ระวังเครื่องดื่มหวานให้มากที่สุด</span>${r.sugaryNote}</div>

      <div class="subh">ตัวอย่างแหล่งโปรตีน — ให้ได้ราว ${r.proteinG[0]}–${r.proteinG[1]} กรัม/วัน</div>
      <table class="ftable"><tbody>
        ${r.proteinFoods.map(f=>`<tr><td>${f[0]}</td><td>${f[1]}</td></tr>`).join('')}
      </tbody></table>
      <div class="tip"><b>วิธีกะง่ายๆ:</b> เนื้อสัตว์ไม่ติดมัน/ปลา 1 ฝ่ามือ ≈ 20–30 ก. — จัดทุกมื้อให้มีโปรตีนอย่างน้อย 1 ฝ่ามือ แล้วเสริมไข่ นม หรือเต้าหู้ให้ครบเป้าหมายต่อวัน</div>

      <div class="twocol" style="margin-top:6px">
        <div>
          <div class="subh">ผักที่แนะนำ (≥ 3 ทัพพี/วัน)</div>
          <div class="chips">${r.veg.map(v=>`<span class="chip">${v}</span>`).join('')}</div>
        </div>
        <div>
          <div class="subh">ผลไม้หวานน้อย (2–3 ส่วน/วัน · 1 ส่วน ≈ 1 กำปั้น)</div>
          <div class="chips">${r.fruitOk.map(v=>`<span class="chip">${v}</span>`).join('')}</div>
          <div class="subh" style="margin-top:10px">ผลไม้หวานจัด — ควรจำกัด</div>
          <div class="chips">${r.fruitLimit.map(v=>`<span class="chip bad">${v}</span>`).join('')}</div>
        </div>
      </div>

      <div class="subh">น้ำมันและไขมัน</div>
      <div class="chips"><span style="font-weight:600;color:var(--teal-deep);font-size:.88rem;align-self:center">ใช้ได้:</span>${r.oilOk.map(v=>`<span class="chip">${v}</span>`).join('')}</div>
      <div class="chips"><span style="font-weight:600;color:#8a3a1c;font-size:.88rem;align-self:center">ควรเลี่ยง:</span>${r.oilAvoid.map(v=>`<span class="chip bad">${v}</span>`).join('')}</div>
      <div class="tip">${r.oilNote}</div>

      ${r.saltSub?`<div class="${r.saltSub.kind==='avoid'?'flag':'callout'}"><span class="${r.saltSub.kind==='avoid'?'':'ct'}">${r.saltSub.kind==='avoid'?'<b>⚠ เกลือโพแทสเซียม:</b> ':'🧂 เกลือโพแทสเซียม (เกลือลดโซเดียม)'}</span>${r.saltSub.text}</div>`:''}
    </div>

    <div class="sec">
      <div class="sec-h"><span class="dot"></span><h3>การออกกำลังกาย</h3><span class="en">EXERCISE</span></div>
      <ul class="rl">${liList(r.ex)}</ul>
    </div>

    <div class="sec">
      <div class="sec-h"><span class="dot"></span><h3>การใช้ยา · การปฏิบัติตัว · การติดตามอาการ</h3><span class="en">CARE & MONITORING</span></div>
      <ul class="rl">${liList(r.med)}</ul>
    </div>

    <div class="sec">
      <div class="sec-h"><span class="dot"></span><h3>วัคซีนที่แนะนำ</h3><span class="en">VACCINES</span></div>
      <div class="vacc">${vaccHtml}</div>
    </div>

    <div class="sec">
      <div class="sec-h"><span class="dot"></span><h3>ไลฟ์สไตล์แบบองค์รวม</h3><span class="en">HOLISTIC WELL-BEING</span></div>
      <ul class="rl">
        <li><b>การนอน</b> 7–8 ชั่วโมง/คืน เวลาสม่ำเสมอ · ห้องนอนมืดและเย็น (22–24°C) · หากตื่นมาไม่สดชื่นหรือกรนหยุดหายใจ (OSA) ควรแจ้งแพทย์</li>
        <li><b>จัดการความเครียด</b> ความเครียดเรื้อรังเพิ่มคอร์ติซอล ทำให้ความดันและน้ำตาลสูง · ฝึกหายใจลึก เทคนิค 4-7-8 วันละ 5–10 นาที</li>
        <li><b>อุปกรณ์ติดตามสุขภาพ</b> สวม Smartwatch ตั้งเป้าเดิน 7,000–10,000 ก้าว/วัน · ใช้ฟังก์ชันแจ้งจังหวะหัวใจผิดปกติ/บันทึก ECG มาให้แพทย์</li>
        <li><b>มลภาวะ PM 2.5</b> วันค่าฝุ่นสูง งดออกกำลังกายกลางแจ้งและเปิดเครื่องฟอกอากาศ เพราะฝุ่นกระตุ้นการอักเสบของหลอดเลือด</li>
      </ul>
    </div>

    <div class="rep-foot">
      <div class="disc">เอกสารนี้เป็นคำแนะนำทั่วไปที่คำนวณจากข้อมูลที่กรอกและอ้างอิงแนวทาง ACC/AHA, ESC, ADA และแนวทางเวชปฏิบัติของไทย เพื่อใช้ประกอบการดูแลตนเอง ไม่ทดแทนการวินิจฉัยและคำสั่งการรักษาของแพทย์ผู้ดูแล กรุณาปรับเป้าหมายโปรตีน/โซเดียม/โพแทสเซียม/ระดับการออกกำลังกายตามผลตรวจจริงและคำแนะนำของแพทย์เฉพาะราย</div>
      <div class="sig">
        <div class="doc">แพทย์ผู้ดูแล: <b>แพทย์ณัฏฐา</b> · <b>แพทย์พรอนงค์</b><br>ลงนาม ____________________________</div>
        <div class="stamp"><div class="clinic">CardioPluz Clinic</div>คลินิกอายุรกรรมโรคหัวใจ คาร์ดิโอพลัซ</div>
      </div>
    </div>
  </div>`;
}

/* ---------- events ---------- */
$('#genBtn').addEventListener('click',()=>{
  const {p,c}=readForm();
  const errs=validate(p);
  const box=$('#alertBox');
  if(errs.length){
    box.textContent='กรุณากรอกข้อมูลให้ครบ: '+errs.join(', ');
    box.classList.add('show'); box.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  box.classList.remove('show');
  const r=buildPlan(p,c);
  render(p,c,r);
  document.querySelector('.stack').style.display='none';
  document.querySelector('.app-head').style.display='none';
  $('#report').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
});

$('#editBtn').addEventListener('click',()=>{
  $('#report').classList.remove('show');
  document.querySelector('.stack').style.display='';
  document.querySelector('.app-head').style.display='';
  window.scrollTo({top:0,behavior:'smooth'});
});

$('#printBtn').addEventListener('click',()=>window.print());

$('#resetBtn').addEventListener('click',()=>{
  document.querySelectorAll('input[type=text],input[type=number]').forEach(i=>i.value='');
  document.querySelectorAll('.cond input[type=checkbox]').forEach(cb=>{cb.checked=false;});
  document.querySelectorAll('.cond').forEach(c=>{c.classList.remove('on');const e=c.querySelector('.extra');if(e)e.classList.remove('show');});
  $('#alertBox').classList.remove('show');
});
</script>
</body>
</html>
